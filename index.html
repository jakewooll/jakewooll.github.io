<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jake Woollard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: 'Figtree', sans-serif;
      color: #111;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .hero-text {
      width: 33.333%;
      min-width: 280px;
    }

    .hero-text p {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 300;
      line-height: 2;
      color: #111;
    }

    .hero-text .hello {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .role-line {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 2em;
    }

    .role-prefix {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 300;
      white-space: nowrap;
      margin-right: 0.4em;
    }

    #role-text {
      color: #0057ff;
      font-weight: 400;
      font-size: clamp(1rem, 2vw, 1.3rem);
      white-space: nowrap;
      border-right: 2px solid #0057ff;
      overflow: hidden;
      width: 0;
    }

    /* ── ARROW ── */
    .arrow-wrap {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: bounce 1.6s ease-in-out infinite;
    }

    .arrow-wrap span {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #999;
      text-transform: uppercase;
    }

    .arrow {
      width: 24px;
      height: 24px;
      border-right: 2px solid #999;
      border-bottom: 2px solid #999;
      transform: rotate(45deg);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    /* ── PORTFOLIO ── */
    .portfolio {
      padding: 4rem 5%;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .tile {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e8e8e8;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    }

    .tile-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .tile-img svg {
      width: 48px;
      height: 48px;
      opacity: 0.2;
    }

    .tile-img .tile-num {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 0.05em;
    }

    .tile-label {
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      font-weight: 400;
      color: #333;
      border-top: 1px solid #f0f0f0;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #fff;
      border-radius: 20px;
      width: 80vw;
      max-height: 85vh;
      overflow-y: auto;
      padding: 2.5rem;
      transform: scale(0.92) translateY(20px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.4rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #888;
      line-height: 1;
    }

    .modal-close:hover { color: #111; }

    .modal-img {
      width: 100%;
      aspect-ratio: 16/7;
      background: #f0f0f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .modal-img svg { width: 64px; height: 64px; opacity: 0.15; }

    .modal h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .modal p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #555;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .hero-text { width: 90%; }
      .tiles { grid-template-columns: 1fr; }
      .modal { width: 95vw; padding: 1.5rem; }
    }

    @media (min-width: 701px) and (max-width: 1000px) {
      .tiles { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <p class="hello">hello!</p>
      <p>my name is jake woollard</p>
      <div class="role-line">
        <span class="role-prefix">i am a</span>
        <span id="role-text"></span>
      </div>
      <p>here is some of my work</p>
    </div>
    <div class="arrow-wrap">
      <div class="arrow"></div>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section class="portfolio">
    <div class="tiles">
      <div class="tile" onclick="openModal(0)">
        <div class="tile-img">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="40" height="40" rx="4" stroke="#111" stroke-width="3"/><line x1="4" y1="4" x2="44" y2="44" stroke="#111" stroke-width="3"/><line x1="44" y1="4" x2="4" y2="44" stroke="#111" stroke-width="3"/></svg>
          <span class="tile-num">01</span>
        </div>
        <div class="tile-label">Project One</div>
      </div>
      <div class="tile" onclick="openModal(1)">
        <div class="tile-img">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="40" height="40" rx="4" stroke="#111" stroke-width="3"/><line x1="4" y1="4" x2="44" y2="44" stroke="#111" stroke-width="3"/><line x1="44" y1="4" x2="4" y2="44" stroke="#111" stroke-width="3"/></svg>
          <span class="tile-num">02</span>
        </div>
        <div class="tile-label">Project Two</div>
      </div>
      <div class="tile" onclick="openModal(2)">
        <div class="tile-img">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="40" height="40" rx="4" stroke="#111" stroke-width="3"/><line x1="44" y1="4" x2="4" y2="44" stroke="#111" stroke-width="3"/><line x1="4" y1="4" x2="44" y2="44" stroke="#111" stroke-width="3"/></svg>
          <span class="tile-num">03</span>
        </div>
        <div class="tile-label">Project Three</div>
      </div>
    </div>
  </section>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-img">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="40" height="40" rx="4" stroke="#111" stroke-width="3"/><line x1="4" y1="4" x2="44" y2="44" stroke="#111" stroke-width="3"/><line x1="44" y1="4" x2="4" y2="44" stroke="#111" stroke-width="3"/></svg>
      </div>
      <h2 id="modal-title"></h2>
      <p id="modal-body"></p>
    </div>
  </div>

  <script>
    /* ── TYPING ROLE ANIMATION ── */
    const roles = ['product manager', 'designer', 'engineer'];
    const el = document.getElementById('role-text');
    let rIdx = 0, cIdx = 0, deleting = false;

    function type() {
      const word = roles[rIdx];
      if (!deleting) {
        el.textContent = word.slice(0, cIdx + 1);
        el.style.width = el.scrollWidth + 'px';
        cIdx++;
        if (cIdx === word.length) {
          setTimeout(() => { deleting = true; type(); }, 1200);
          return;
        }
        setTimeout(type, 65);
      } else {
        el.textContent = word.slice(0, cIdx - 1);
        el.style.width = el.scrollWidth + 'px';
        cIdx--;
        if (cIdx === 0) {
          deleting = false;
          rIdx = (rIdx + 1) % roles.length;
          setTimeout(type, 300);
          return;
        }
        setTimeout(type, 35);
      }
    }
    setTimeout(type, 600);

    /* ── MODAL ── */
    const projects = [
      {
        title: 'Project One',
        body: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.'
      },
      {
        title: 'Project Two',
        body: 'Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas. Vestibulum tortor quam, feugiat vitae, ultricies eget, tempor sit amet, ante. Donec eu libero sit amet quam egestas semper. Aenean ultricies mi vitae est. Mauris placerat eleifend leo.'
      },
      {
        title: 'Project Three',
        body: 'Quisque sit amet est et sapien ullamcorper pharetra. Vestibulum erat wisi, condimentum sed, commodo vitae, ornare sit amet, wisi. Aenean fermentum, elit eget tincidunt condimentum, eros ipsum rutrum orci, sagittis tempus lacus enim ac dui. Donec non enim in turpis pulvinar facilisis.'
      }
    ];

    function openModal(i) {
      document.getElementById('modal-title').textContent = projects[i].title;
      document.getElementById('modal-body').textContent = projects[i].body;
      document.getElementById('modal-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
